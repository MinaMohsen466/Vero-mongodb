<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:;">
  <title>Vero</title>
  <link rel="icon" type="image/png" href="/public/icon.png" />
  <style>
    body {
      margin: 0;
      background: #0f172a; /* Slate 900 */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    .initial-loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 99999;
    }
    .initial-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(59, 130, 246, 0.1);
      border-radius: 50%;
      border-top-color: #2563eb; /* Primary Blue */
      animation: spin 1s ease-in-out infinite;
    }
    .initial-text {
      color: #94a3b8; /* Slate 400 */
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      direction: rtl;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="initial-loading">
      <div class="initial-spinner"></div>
      <div class="initial-text">جارٍ تشغيل نظام Vero للمحاسبة...</div>
    </div>
  </div>
  <script type="module" src="/clientSide/main.jsx"></script>
</body>

</html>
